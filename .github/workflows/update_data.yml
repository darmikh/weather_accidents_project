name: Update DTP and Weather Data

on:
  schedule:
    # Запуск каждый день в 3:00 UTC (6:00 МСК)
    - cron: '0 3 * * *'
  workflow_dispatch:  # возможность ручного запуска

jobs:
  update:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v3
      
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'
        
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements-etl.txt
        
    - name: Run ETL process
      env:
        SUPABASE_DB_USER: ${{ secrets.SUPABASE_DB_USER }}
        SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
        SUPABASE_DB_HOST: ${{ secrets.SUPABASE_DB_HOST }}
        SUPABASE_DB_NAME: ${{ secrets.SUPABASE_DB_NAME }}
      run: python src/etl/main.py
      
    - name: Send success notification
      if: success()
      run: echo "Data update completed successfully at $(date)"
      
    - name: Send failure notification
      if: failure()
      run: echo "Data update failed at $(date)"
